id: wellness
display_name: Wellness
aliases:
  - wellness project
  - health and nutrition
  - malibu wellness
default_agent: malibu
provider:
  default: claude-oauth
  fallback:
    - claude-oauth-secondary
    - codex
worker_ids:
  - health-analyst
  - nutrition-logger
  - recipe-librarian
  - workout-recorder
tool_contract_ids:
  - healthdb.today_summary
  - healthdb.sleep_summary
  - healthdb.activity_summary
  - healthdb.recovery_summary
  - healthdb.weekly_trends
  - fatsecret.search_food
  - fatsecret.log_food
  - fatsecret.day_summary
  - atlas.ingredients.lookup
  - atlas.ingredients.create
  - atlas.recipes.lookup
  - atlas.recipes.upsert
  - obsidian.recipe_notes.read
  - obsidian.recipe_notes.write
  - obsidian.recipe_notes.validate_frontmatter
  - workouts.start_session
  - workouts.log_set
  - workouts.finish_session
  - workouts.today_summary
  - workouts.exercise_history
policies:
  topic_mode: optional
  write_confirmation: on-ambiguity
