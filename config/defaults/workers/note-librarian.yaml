id: note-librarian
type: librarian
display_name: Note Librarian
description: Shared Obsidian vault worker for reading, summarizing, appending, and updating local notes.
provider:
  default: claude-oauth
  reasoning_effort: high
  fallback:
    - claude-oauth-secondary
    - codex
tool_contract_ids:
  - obsidian
  - memory_search
  - memory_add
  - memory_reflect
inactivity_timeout_seconds: 600
skill_doc_ids:
  - obsidian_note_conventions
policy:
  write_scope: limited
  confirm_before_write: false
execution: agent
prompt_file: ../../../agents/workers/note-librarian/soul.md
