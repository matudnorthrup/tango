id: slack-saved-review
display_name: Slack Saved Items Review
description: >
  Review Slack saved items, summarize each, and write them as tasks in the
  Obsidian daily note.
  Also logs to Records/Jobs/Slack/ for daily brief aggregation.
enabled: true
runtime: v2

obsidian_log:
  domain: Slack
  job_name: Slack Saved Items Review

schedule:
  cron: "45 4 * * *"
  timezone: America/Los_Angeles

execution:
  mode: agent
  worker_id: research-assistant
  intent_ids:
    - productivity.slack_saved_review
  deterministic_agent_id: watson
  task: |
    Review Devin's Slack saved items.

    1. Use the slack tool with action "saved_items" and since_hours 48
       to get recently saved messages.

    2. For each saved message:
       - Resolve the user ID to a display name using slack action "user_info"
       - Write a one-line summary of what the message is about
       - Include the permalink

    3. Write to Obsidian daily note at Planning/Daily/YYYY-MM-DD.md:
       - Determine today's date in America/Los_Angeles timezone
       - Add a "## Slack Saved Items" section
       - For each item, add a task line: - [ ] [Summary](permalink) — #channel-name
       - Use direct filesystem I/O (NOT obsidian-cli)
       - If the file doesn't exist yet, create it with minimal frontmatter
       - If the section already exists, replace it

    4. If no saved items are found, skip the daily note section.

    5. For each processed item, call the slack tool with action
       "remove_star", channel_id set to the item's channel_id, and
       timestamp set to the item's ts. This prevents items from
       repeating in the next daily run.

    Important: The daily note path is ~/Documents/main/Planning/Daily/YYYY-MM-DD.md
  timeout_seconds: 180

provider:
  model: sonnet

delivery:
  mode: none

completion:
  workflow_id: slack-saved-review
  scope: daily

policy:
  max_consecutive_failures: 3
  alert_channel_id: "100000000000000010"
  backoff:
    enabled: true
    initial_seconds: 300
    max_seconds: 3600

tags:
  - watson
  - slack
  - daily
  - obsidian
