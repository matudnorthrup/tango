id: contacts-sync
display_name: Contacts Sync
description: >
  Export macOS Contacts (AddressBook) to JSON for iMessage contact name
  resolution. Runs daily at 4am to pick up any new or changed contacts.
enabled: true

schedule:
  cron: "0 4 * * *"
  timezone: America/Los_Angeles

execution:
  mode: deterministic
  handler: contacts-sync
  timeout_seconds: 30

policy:
  max_consecutive_failures: 3
  priority: 1

tags:
  - imessage
  - contacts
  - sync
