id: weekly-finance-review
display_name: Finance Review (Rolling)
description: >
  Sunday rolling finance review using the unified finance_review workflow:
  data freshness, transaction backlog, budget pace, reimbursements, and sinking
  fund contribution/draw status.
enabled: true
runtime: v2

obsidian_log:
  domain: Finance
  job_name: Finance Review

schedule:
  cron: "0 7 * * 0"
  timezone: America/Los_Angeles

execution:
  mode: agent
  deterministic_agent_id: foxtrot
  worker_id: personal-assistant
  intent_ids:
    - finance.budget_review
    - finance.sinking_fund_reconciliation
    - finance.transaction_lookup
  task: |
    Run a Finance Review for the Foxtrot finance thread.

    Review parameters:
    - review_phase: rolling
    - dry_run: false
    - review_window: current month-to-date
    - lookback_window: since the most recent review note

    IMPORTANT: Confirm today's date before doing any date math.

    Follow the unified finance_review skill guidance in
    agents/skills/finance-review.md. Weekly review is the rolling phase of the
    same process, not a separate workflow.

    Required behavior:
    1. Refresh stale Lunch Money/Plaid account data before judging missing
       transactions or sinking fund contributions. Use POST
       /plaid_accounts/fetch for stale relevant accounts, wait briefly, then
       re-query.
    2. Check job health, uncleared/uncategorized transaction backlog, receipt
       and reimbursement gaps, budget pace, rolling 30-day spending signals,
       sinking fund contributions, and sinking fund draw recommendations.
    3. For Ramp/Latitude reimbursements, use receipt_registry structured
       actions first. Reconcile against live Ramp history before claiming an
       item is pending, unsubmitted, submitted, or reimbursed. Do not infer
       reimbursement amounts from Base views, old review notes, or note search.
    4. For sinking fund draws, classify recommendations as monitor/defer,
       optional, do now, or month-end true-up. Do not create or manage Ramp
       drafts.
    5. Create or overwrite the review note at
       Records/Finance/Reviews/YYYY-MM-DD Finance Review.md.
    6. Return a concise summary with review phase, data freshness, top flags,
       sinking fund recommendation summary, reimbursement/receipt gaps, budget
       pace signals, and review note path.

    Do not submit to Ramp or mutate Lunch Money categories/status unless the
    user explicitly approved a correction during the review.

    Rate limit: wait 0.3s between Lunch Money API calls.
  timeout_seconds: 600

provider:
  model: claude-sonnet-4-6

delivery:
  mode: none

completion:
  workflow_id: weekly-finance-review
  scope: weekly

policy:
  max_consecutive_failures: 3
  alert_channel_id: "100000000000000010"
  concurrency_group: ledger-tasks
  priority: 5
  backoff:
    enabled: true
    initial_seconds: 120
    max_seconds: 3600

tags:
  - foxtrot
  - finance
  - rolling-review
