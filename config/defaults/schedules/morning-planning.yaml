id: morning-planning
display_name: Morning Planning Backstop
description: >
  Generate the morning planning briefing if the user hasn't already done it
  manually. Checks calendar, email priorities, and outstanding tasks.
enabled: true
runtime: v2

obsidian_log:
  domain: Planning
  job_name: Morning Planning

schedule:
  cron: "15 5 * * *"
  timezone: America/Los_Angeles

execution:
  mode: agent
  worker_id: personal-assistant
  intent_ids:
    - planning.morning_review
  deterministic_agent_id: watson
  task: |
    Run the morning planning session.

    **Step 1: Create today's daily note from template.**
    Check if ~/Documents/main/Planning/Daily/YYYY-MM-DD.md exists.
    If it does NOT exist, create it from the template at
    ~/Documents/main/_Schema/Templates/Daily Notes Template.md.
    Substitute these tokens in the template:
    - {{date:YYYY-MM-DD}} → today's date (e.g. 2026-04-30)
    - {{date:YYYY [Week] w [Plan]}} → e.g. "2026 Week 18 Plan"
    - {{date:YYYY [Q]Q [Plan]}} → e.g. "2026 Q2 Plan"

    The frontmatter MUST include:
    - brief: "[[Records/Briefs/YYYY-MM-DD]]"
    - All other fields from the template exactly as specified

    If the daily note already exists, verify the frontmatter has the
    `brief:` field. Add it if missing.

    **Step 2: Read today's brief and yesterday's note.**
    - Read ~/Documents/main/Records/Briefs/YYYY-MM-DD.md for today's
      brief (flagged items, calendar, overnight job summaries)
    - Read yesterday's daily note for carryover tasks (unchecked items)
    - Get today's calendar events from both accounts (--all for
      non-primary calendars)

    **Step 3: Fill in the daily note.**
    Update ~/Documents/main/Planning/Daily/YYYY-MM-DD.md:
    - "## Today's Priorities" — top 3-5 tasks based on brief flags,
      carryovers, and calendar. Include dates in format: task—YYYY-MM-DD
    - "## Stretch (if capacity)" — lower priority items
    - "## Routines" — keep exactly as template:
      - [ ] Slack saved items (Morning)
      - [ ] Check/Update Linear (Afternoon)
      - [ ] Discord and Reddit (Afternoon)
    - Add "## Time Blocks" section with schedule for the day, working
      around existing calendar events
    - If the brief has flagged/urgent items, note them in priorities
      with action recommendation

    Do NOT modify the frontmatter fields other than adding `brief:` if
    missing. Do NOT add a Morning Brief section to the daily note — that
    content lives in Records/Briefs/.

    **Step 4: Return a concise summary** of what was planned.
  timeout_seconds: 300

provider:
  model: sonnet

delivery:
  mode: none

completion:
  workflow_id: morning-planning
  scope: daily

policy:
  max_consecutive_failures: 3
  alert_channel_id: "100000000000000010"
  concurrency_group: watson-tasks
  priority: 10
  backoff:
    enabled: true
    initial_seconds: 120
    max_seconds: 3600

tags:
  - watson
  - morning
  - planning
