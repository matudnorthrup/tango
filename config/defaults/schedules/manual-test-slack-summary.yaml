id: manual-test-slack-summary
display_name: Manual Test Slack Channel Summary
description: >
  Manual deterministic validation clone of the daily Slack digest.
enabled: false

schedule:
  cron: "0 16 * * *"
  timezone: America/Los_Angeles

execution:
  mode: agent
  worker_id: research-assistant
  intent_ids:
    - research.slack_digest
  deterministic_agent_id: sierra
  task: |
    Run a Slack digest for ALL channels the bot is in.

    Follow the slack_digest skill guidance. Use the slack tool to:
    1. List all channels
    2. Fetch the last 24 hours of history from each
    3. Resolve user IDs to names
    4. Read thread replies for high-engagement threads (reply_count >= 3)

    Synthesize the activity into a concise narrative briefing organized
    by significance, not by channel. Lead with what matters most.
    Group related discussions across channels. Skip noise.

    This is a daily digest — the reader should finish knowing what
    happened today without having to open Slack.
  timeout_seconds: 300

provider:
  model: sonnet

delivery:
  channel_id: "100000000000001003"
  agent_id: sierra

completion:
  workflow_id: manual-test-slack-summary
  scope: daily

policy:
  max_consecutive_failures: 3
  alert_channel_id: "100000000000000010"
  concurrency_group: sierra-test-tasks
  priority: 3
  backoff:
    enabled: true
    initial_seconds: 300
    max_seconds: 3600

tags:
  - sierra
  - slack
  - daily
  - manual-test
