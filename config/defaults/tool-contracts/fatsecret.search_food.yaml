id: fatsecret.search_food
family: fatsecret
description: Search FatSecret foods and serving sizes before logging.
owner_worker: nutrition-logger
mode: read
status: implemented
live_execution:
  enabled: true
  write_enabled: false
integration:
  system: fatsecret
  target: food-search
input_fields:
  - query
output_fields:
  - food_id
  - serving_id
  - serving_description
  - calories
  - protein
legacy:
  commands:
    - node ~/.tango/tools/nutrition-coach/scripts/nutrition-helper.js search "<query>"
    - ~/.tango/tools/nutrition-coach/venv/bin/python ~/.tango/tools/nutrition-coach/scripts/fatsecret-helper.py search "<query>"
  read_paths:
    - ~/.tango/secrets/fatsecret-api.json
    - ~/.tango/secrets/fatsecret-user-tokens.json
    - FatSecret remote food database
  write_paths:
    - none (legacy search flow was read-only)
