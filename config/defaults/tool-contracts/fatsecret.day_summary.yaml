id: fatsecret.day_summary
family: fatsecret
description: Read a day's FatSecret diary entries and macro totals.
owner_worker: nutrition-logger
mode: read
status: implemented
live_execution:
  enabled: true
  write_enabled: false
integration:
  system: fatsecret
  target: food-diary
input_fields:
  - date? (defaults to today)
output_fields:
  - entries
  - totals
legacy:
  commands:
    - node ~/.tango/tools/nutrition-coach/scripts/nutrition-helper.js today
    - ~/.tango/tools/nutrition-coach/venv/bin/python ~/.tango/tools/nutrition-coach/scripts/fatsecret-helper.py today
  read_paths:
    - FatSecret diary entries for the requested date
  write_paths:
    - none (legacy flow was read-only)
