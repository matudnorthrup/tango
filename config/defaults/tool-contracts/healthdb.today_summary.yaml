id: healthdb.today_summary
family: healthdb
description: Same-day wellness summary from the legacy Apple Health pipeline.
owner_worker: health-analyst
mode: read
status: implemented
live_execution:
  enabled: true
  write_enabled: false
integration:
  system: mongodb
  target: health-auto-export
input_fields:
  - date? (defaults to today)
  - timezone? (defaults to America/Los_Angeles)
output_fields:
  - today
  - last_night
  - yesterday
  - today_vitals
legacy:
  commands:
    - node ~/.tango/tools/health-data/scripts/health-query.js --date today
    - node ~/.tango/tools/health-data/scripts/health-query.js --checkin
  read_paths:
    - ~/.tango/tools/health-data/scripts/health-query.js
    - "MongoDB health-auto-export collections: sleep_analysis, heart_rate_variability, resting_heart_rate, step_count, apple_exercise_time, active_energy, basal_energy_burned, workouts"
    - ~/.tango/profiles/default/notes/health-daily/YYYY-MM-DD.md (read context only)
  write_paths:
    - none (legacy flow was read-only)
