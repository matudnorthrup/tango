id: fatsecret.log_food
family: fatsecret
description: Log a food entry to the FatSecret diary for a specific meal.
owner_worker: nutrition-logger
mode: write
status: implemented
live_execution:
  enabled: true
  write_enabled: true
integration:
  system: fatsecret
  target: food-diary
input_fields:
  - food_id
  - serving_id
  - number_of_units
  - meal
  - date? (defaults to today)
output_fields:
  - food_entry_id
  - food_entry_name
  - calories
  - protein
legacy:
  commands:
    - node ~/.tango/tools/nutrition-coach/scripts/nutrition-helper.js log <food_id> <serving_id> <units> <meal>
    - ~/.tango/tools/nutrition-coach/venv/bin/python ~/.tango/tools/nutrition-coach/scripts/fatsecret-helper.py log <food_id> <serving_id> <units> <meal>
  read_paths:
    - ~/.tango/secrets/fatsecret-api.json
    - ~/.tango/secrets/fatsecret-user-tokens.json
  write_paths:
    - FatSecret diary entry for the target day and meal
    - Apple Health nutrition collections after FatSecret sync
    - ~/.tango/profiles/default/notes/health-daily/YYYY-MM-DD.md#Nutrition (summary append in legacy channel flow)
