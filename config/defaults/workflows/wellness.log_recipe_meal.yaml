id: wellness.log_recipe_meal
display_name: Log Recipe Meal
description: Log a recurring named meal by using the recipe note and related nutrition sources. The workflow scopes the write, while the owning worker still decides the exact ingredient resolution and logging steps.
owner_worker: nutrition-logger
mode: write
status: implemented
confirmation_required: false
handler: log_recipe_meal
tool_contract_ids:
  - obsidian.recipe_notes.read
  - atlas.ingredients.lookup
  - fatsecret.log_food
  - fatsecret.day_summary
input_fields:
  - recipe_query
  - meal
  - date_scope? (today by default)
  - ingredient_mentions? (quantity overrides or extra ingredient logs inferred from the prompt)
examples:
  - Can you log my protein yogurt bowl for breakfast this morning?
  - Log my lean taco bowl for dinner
  - "Log today's lunch: asian power salad, but make it 200g chicken and 140g black beans, plus 12g honey for my walk"
planning:
  summary: Prefer this over asking the user to restate recurring recipes when a recipe note likely exists. The workflow defines the objective, but the nutrition worker still chooses the exact lookup, resolution, and logging path.
  when_to_use:
    - the user asks to log a named recurring meal or recipe
    - the meal sounds like a saved recipe or staple
    - the user includes quantity adjustments or a small extra ingredient to be logged in the same request
  ask_for_clarification_when:
    - multiple recipe notes match the description
    - the recipe note exists but ingredient resolution is ambiguous
