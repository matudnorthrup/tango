id: productivity.slack_saved_review
domain: productivity
display_name: Slack Saved Items Review
description: Review Slack messages a user bookmarked with reactions, summarize them, and write the results into the daily note and Slack job log.
mode: mixed
route:
  kind: worker
  target_id: research-assistant
slots:
  - name: date_scope
    required: false
    inferable: true
  - name: focus
    required: false
    inferable: true
examples:
  - Review my saved Slack items and add them to today's daily note.
  - Run the Slack saved items review.
classifier_hints:
  - Use for workflows that gather bookmarked Slack messages and persist the results into local notes or logs.
  - Prefer research.slack_digest for channel digests that summarize Slack activity without updating files.
