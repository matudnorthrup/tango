id: shopping.browser_order_lookup
domain: shopping
display_name: Browser Order Lookup
description: Look up order, cart, retailer, or browser-backed shopping details without making changes.
mode: read
route:
  kind: worker
  target_id: research-assistant
slots:
  - name: retailer
    required: false
    inferable: true
  - name: order_query
    required: false
    inferable: true
examples:
  - Check my Walmart order status.
  - Look up what happened with that Costco order.
  - Find the details for my recent Amazon order.
classifier_hints:
  - Use for read-only browser-backed order or shopping-state lookups.
  - Prefer finance.receipt_lookup when the user is asking from a transaction-review or Lunch Money context.
  - Prefer shopping.browser_order_action when the user wants to modify a cart, start checkout, or place an order.
