id: nutrition.log_food
domain: wellness
display_name: Log Food Items
description: Log ad-hoc individual food items or simple meal descriptions into the nutrition diary.
mode: write
route:
  kind: workflow
  target_id: wellness.log_food_items
slots:
  - name: items
    required: true
    inferable: false
  - name: meal
    required: false
    inferable: true
  - name: date_scope
    required: false
    inferable: true
examples:
  - Log 2 eggs and toast for breakfast
  - I had a protein bar
  - Log a yogurt treat as a snack
classifier_hints:
  - Use for ad-hoc foods described inline rather than named recurring meals.
