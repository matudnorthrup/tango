id: notes.note_update
domain: notes
display_name: Update Note
description: Update or append to an existing local or Obsidian note with a clear note target and change request.
mode: write
route:
  kind: worker
  target_id: personal-assistant
slots:
  - name: note_query
    required: true
    inferable: false
  - name: change_request
    required: true
    inferable: false
examples:
  - Update the desk project note with today's measurements.
  - Append a short status update to the OpenGrid note.
classifier_hints:
  - Use for local or Obsidian note write/update requests outside Malibu recipe management.
  - Prefer recipe.update for recipe notes and docs.google_doc_read_or_update for Google Docs.
