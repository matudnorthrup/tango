id: watson
type: personal
display_name: Watson
provider:
  default: claude-oauth
  reasoning_effort: medium
  fallback:
    - claude-oauth-secondary
    - codex
default_topic: personal/default
default_project: personal
voice:
  call_signs:
    - Watson
  default_channel_id: "100000000000000001"
  smoke_test_channel_id: "100000000000001001"
response_mode: concise
tools:
  mode: allowlist
  allowlist:
    - WebSearch
    - WebFetch
orchestration:
  worker_ids:
    - personal-assistant
  write_confirmation: on-ambiguity
deterministic_routing:
  enabled: true
  confidence_threshold: 0.8
  provider:
    default: claude-oauth
    reasoning_effort: low
    fallback:
      - claude-oauth-secondary
      - codex
access:
  mode: allowlist
  allowlist_user_ids:
    - "100000000000002001"
prompt_file: ../../../agents/assistants/watson/soul.md
