id: watson-ollama
enabled: true
display_name: Watson (Ollama)
type: personal

# System prompt = personality + domain + rules
system_prompt_file: agents/assistants/watson/soul.md

# MCP servers this agent can access
mcp_servers:
  - name: memory
    command: node
    args: ["packages/atlas-memory/dist/index.js"]
  - name: attachments
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "attachments"]
    env:
      ALLOWED_TOOL_IDS: "attachment_search,attachment_read,attachment_status"
  - name: google
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "google"]
    env:
      ALLOWED_TOOL_IDS: "gog_email,gog_calendar,gog_docs,gog_docs_update_tab"
  - name: obsidian
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "obsidian"]
    env:
      ALLOWED_TOOL_IDS: "obsidian"
  - name: browser
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "browser"]
    env:
      ALLOWED_TOOL_IDS: "browser"
  - name: onepassword
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "onepassword"]
    env:
      ALLOWED_TOOL_IDS: "onepassword"
  - name: linear
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "linear"]
    env:
      ALLOWED_TOOL_IDS: "linear"
  - name: slack
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "slack"]
    env:
      ALLOWED_TOOL_IDS: "slack"
  - name: agent-docs
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "agent-docs"]
    env:
      ALLOWED_TOOL_IDS: "agent_docs"
  - name: claude-sessions
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "claude-sessions"]
    env:
      ALLOWED_TOOL_IDS: "spawn_claude_session,list_claude_sessions"
  - name: orientation
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "orientation"]
    env:
      ALLOWED_TOOL_IDS: "orientation_nudge"
  - name: latitude
    command: mcp-remote
    args: ["https://mcp.example.invalid/oauth/mcp"]
  - name: send-image
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "send-image"]
    env:
      ALLOWED_TOOL_IDS: "discord_send_image"

mcp:
  default_servers:
    - memory
    - google

# Runtime configuration
runtime:
  mode: persistent
  provider: claude-code-v2
  fallback: codex
  # Model bake-off live test (2026-06-08): watson is judgment-heavy (planning,
  # morning briefing, prioritization) where "thinking" models earned their keep —
  # GLM-5 gave the deepest, most insightful reads on ambiguous tasks. Operational
  # clones use MiniMax M2.5 (faster). Others stay on deepseek as the A/B baseline.
  model: glm-5
  reasoning_effort: medium
  idle_timeout_hours: 24
  context_reset_threshold: 0.80

# Memory configuration
memory:
  post_turn_extraction: enabled
  canonical_agent_id: watson
  alias_agent_ids:
    - watson
    - watson-ollama
  extraction_provider: ollama
  extraction_model: deepseek-v4-pro:cloud
  importance_threshold: 0.4
  scheduled_reflection: enabled

# Discord routing
discord:
  default_channel_id: "100000000000000001"
  smoke_test_channel_id: "100000000000001001" # watson-test (placeholder; real id in profile overlay)

# Restrict this clone to its own channel plus its persona's -test smoke channel
access:
  mode: allowlist
  allowlist_channel_ids:
    - "100000000000000001"
    - "100000000000001001" # watson-test smoke channel (placeholder; real id in profile overlay)

# Legacy registry fields (used by agentRegistry consumers)
avatar_url: https://example.com/tango/avatars/watson.png
default_topic: personal/default
default_project: personal
response_mode: concise

provider:
  default: ollama
  model: deepseek-v4-pro:cloud
  reasoning_effort: medium
  fallback: []

tools:
  mode: allowlist
  allowlist:
    - WebSearch
    - WebFetch

deterministic_routing:
  enabled: false
  confidence_threshold: 0.8
  provider:
    default: claude-oauth
    reasoning_effort: low
    fallback:
      - claude-oauth-secondary
      - codex

# Voice addressing — Ollama clones are the primary voice targets: the bare
# name (and hey/hello greetings, which the matcher treats as optional
# prefixes) routes here; "Zulu Watson" is the original's fallback wake word.
voice:
  call_signs:
    - "Bravo Watson"
    - Watson
  kokoro_voice: bm_george
  default_channel_id: "100000000000000001"
  smoke_test_channel_id: "100000000000001001" # watson-test (placeholder; real id in profile overlay)
