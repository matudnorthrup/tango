id: watson
enabled: false
display_name: Watson
type: personal

# System prompt = personality + domain + rules
system_prompt_file: agents/assistants/watson/soul.md

# MCP servers this agent can access
mcp_servers:
  - name: memory
    command: node
    args: ["packages/atlas-memory/dist/index.js"]
  - name: google
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "google"]
    env:
      ALLOWED_TOOL_IDS: "gog_email,gog_calendar,gog_docs,gog_docs_update_tab"
  - name: obsidian
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "obsidian"]
    env:
      ALLOWED_TOOL_IDS: "obsidian"
  - name: browser
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "browser"]
    env:
      ALLOWED_TOOL_IDS: "browser"
  - name: onepassword
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "onepassword"]
    env:
      ALLOWED_TOOL_IDS: "onepassword"
  - name: linear
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "linear"]
    env:
      ALLOWED_TOOL_IDS: "linear"
  - name: slack
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "slack"]
    env:
      ALLOWED_TOOL_IDS: "slack"
  - name: agent-docs
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "agent-docs"]
    env:
      ALLOWED_TOOL_IDS: "agent_docs"
  - name: latitude
    command: mcp-remote
    args: ["https://mcp.preview.aidungeon.com/oauth/mcp"]

# Runtime configuration
runtime:
  mode: persistent
  provider: claude-code-v2
  fallback: codex
  model: claude-sonnet-4-6
  reasoning_effort: medium
  idle_timeout_hours: 24
  context_reset_threshold: 0.80

# Memory configuration
memory:
  post_turn_extraction: enabled
  extraction_model: claude-haiku-4-5
  importance_threshold: 0.4
  scheduled_reflection: enabled

# Voice configuration
voice:
  call_signs:
    - Watson
  kokoro_voice: bm_george
  default_channel_id: "1480419548212498442"
  smoke_test_channel_id: "1488248022335881390"

# Discord routing
discord:
  default_channel_id: "1480419548212498442"
  smoke_test_channel_id: "1488248022335881390"

# Legacy registry fields (used by agentRegistry consumers)
avatar_url: https://cdn.discordapp.com/avatars/1480550056523468861/ff5bac712e31630feba87803474bc0c6.webp
default_topic: personal/default
default_project: personal
response_mode: concise

provider:
  default: claude-oauth
  reasoning_effort: medium
  fallback:
    - claude-oauth-secondary
    - codex

tools:
  mode: allowlist
  allowlist:
    - WebSearch
    - WebFetch

orchestration:
  worker_ids:
    - personal-assistant
    - note-librarian
  write_confirmation: on-ambiguity

deterministic_routing:
  enabled: true
  confidence_threshold: 0.8
  provider:
    default: claude-oauth
    reasoning_effort: low
    fallback:
      - claude-oauth-secondary
      - codex
