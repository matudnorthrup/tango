id: watson
enabled: false
display_name: Watson
type: personal

# System prompt = personality + domain + rules
system_prompt_file: agents/assistants/watson/soul.md

# MCP servers this agent can access
mcp_servers:
  - name: memory
    command: node
    args: ["packages/atlas-memory/dist/index.js"]
  - name: attachments
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "attachments"]
    env:
      ALLOWED_TOOL_IDS: "attachment_search,attachment_read,attachment_status"
  - name: google
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "google"]
    env:
      ALLOWED_TOOL_IDS: "gog_email,gog_calendar,gog_docs,gog_docs_update_tab"
  - name: obsidian
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "obsidian"]
    env:
      ALLOWED_TOOL_IDS: "obsidian"
  - name: browser
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "browser"]
    env:
      ALLOWED_TOOL_IDS: "browser"
  - name: onepassword
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "onepassword"]
    env:
      ALLOWED_TOOL_IDS: "onepassword"
  - name: linear
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "linear"]
    env:
      ALLOWED_TOOL_IDS: "linear"
  - name: slack
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "slack"]
    env:
      ALLOWED_TOOL_IDS: "slack"
  - name: agent-docs
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "agent-docs"]
    env:
      ALLOWED_TOOL_IDS: "agent_docs"
  - name: claude-sessions
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "claude-sessions"]
    env:
      ALLOWED_TOOL_IDS: "spawn_claude_session,list_claude_sessions"
  - name: orientation
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "orientation"]
    env:
      ALLOWED_TOOL_IDS: "orientation_nudge"
  - name: collaboration
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "collaboration"]
    env:
      ALLOWED_TOOL_IDS: "collaborate_with_agent"
  - name: sub-agent-jobs
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "sub-agent-jobs"]
    env:
      ALLOWED_TOOL_IDS: "start_sub_agent_job,get_sub_agent_job,list_sub_agent_jobs,cancel_sub_agent_job,send_sub_agent_job_update"
  - name: latitude
    command: mcp-remote
    args: ["https://mcp.example.invalid/oauth/mcp"]
  - name: send-image
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "send-image"]
    env:
      ALLOWED_TOOL_IDS: "discord_send_image"

mcp:
  default_servers:
    - memory
    - google

# Runtime configuration
runtime:
  mode: persistent
  provider: claude-code-v2
  fallback: codex
  model: claude-opus-4-8
  reasoning_effort: medium
  idle_timeout_hours: 24
  context_reset_threshold: 0.80

# Memory configuration
memory:
  post_turn_extraction: enabled
  canonical_agent_id: watson
  alias_agent_ids:
    - watson
    - watson-ollama
  extraction_model: claude-haiku-4-5
  importance_threshold: 0.4
  scheduled_reflection: enabled

responsibilities:
  - id: personal_coordination
    description: Coordinate bounded personal-assistant work with specialist agents when their configured responsibilities fit the user's goal.
    objectives:
      - Preserve the user's goal and constraints when asking specialists for help.
      - Use specialist agents for bounded read or draft support, not as a way around confirmation requirements.
    autonomy:
      default: supervised
      writes_require_confirmation: true
      purchase_or_payment: never
    collaboration:
      can_request:
        - agent: sierra
          purposes: ["source-check", "vendor-comparison"]
        - agent: foxtrot
          purposes: ["receipt-status-check", "finance-summary"]

# Voice configuration
voice:
  call_signs:
    - "Zulu Watson"
  kokoro_voice: bm_george
  default_channel_id: "100000000000000001"
  smoke_test_channel_id: "100000000000001001"

# Discord routing
discord:
  default_channel_id: "100000000000000001"
  smoke_test_channel_id: "100000000000001001"

# Legacy registry fields (used by agentRegistry consumers)
avatar_url: https://example.com/tango/avatars/watson.png
default_topic: personal/default
default_project: personal
response_mode: concise

provider:
  default: claude-oauth
  reasoning_effort: medium
  fallback:
    - claude-oauth-secondary
    - codex

tools:
  mode: allowlist
  allowlist:
    - WebSearch
    - WebFetch
    - mcp__collaboration__collaborate_with_agent
    - mcp__sub-agent-jobs__start_sub_agent_job
    - mcp__sub-agent-jobs__get_sub_agent_job
    - mcp__sub-agent-jobs__list_sub_agent_jobs
    - mcp__sub-agent-jobs__cancel_sub_agent_job
    - mcp__sub-agent-jobs__send_sub_agent_job_update

deterministic_routing:
  enabled: true
  confidence_threshold: 0.8
  provider:
    default: claude-oauth
    reasoning_effort: low
    fallback:
      - claude-oauth-secondary
      - codex
