id: charlie
display_name: Charlie
type: quick

# System prompt = personality + domain + rules
system_prompt_file: agents/assistants/charlie/soul.md

# MCP servers this agent can access
mcp_servers:
  - name: memory
    command: node
    args: ["packages/atlas-memory/dist/index.js"]
  - name: exa
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "exa"]
    env:
      ALLOWED_TOOL_IDS: "exa_search,exa_answer"
  - name: agent-docs
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "agent-docs"]
    env:
      ALLOWED_TOOL_IDS: "agent_docs"

# Runtime configuration
runtime:
  mode: persistent
  provider: claude-code-v2
  fallback: codex
  model: claude-sonnet-4-6
  reasoning_effort: low
  idle_timeout_hours: 4
  context_reset_threshold: 0.50

# Memory configuration — NO writes
memory:
  post_turn_extraction: disabled
  extraction_model: claude-haiku-4-5
  importance_threshold: 0.9
  scheduled_reflection: disabled

# Voice configuration
voice:
  call_signs:
    - Charlie
  kokoro_voice: af_aoede
  default_channel_id: "1499163931636138135"

# Discord routing
discord:
  default_channel_id: "1499163931636138135"
  smoke_test_channel_id: "1499163946643493025"
