id: malibu
enabled: false
display_name: Malibu
type: wellness

# System prompt = personality + domain + rules
system_prompt_file: agents/assistants/malibu/soul.md

# MCP servers this agent can access
mcp_servers:
  - name: memory
    command: node
    args: ["packages/atlas-memory/dist/index.js"]
  - name: wellness
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "wellness"]
    env:
      ALLOWED_TOOL_IDS: "health_query,workout_sql,nutrition_log_items,recipe_list,recipe_read,recipe_write,system_clock,health_morning"
  - name: fatsecret
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "fatsecret"]
    env:
      ALLOWED_TOOL_IDS: "fatsecret_api"
  - name: atlas
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "atlas"]
    env:
      ALLOWED_TOOL_IDS: "atlas_sql"
  - name: obsidian
    # Note: read-only for Malibu (enforced at MCP server level)
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "obsidian"]
    env:
      ALLOWED_TOOL_IDS: "obsidian"
  - name: agent-docs
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "agent-docs"]
    env:
      ALLOWED_TOOL_IDS: "agent_docs"

# Runtime configuration
runtime:
  mode: persistent
  provider: claude-code-v2
  fallback: codex
  model: claude-sonnet-4-6
  reasoning_effort: medium
  idle_timeout_hours: 24
  context_reset_threshold: 0.80

# Memory configuration
memory:
  post_turn_extraction: enabled
  extraction_model: claude-haiku-4-5
  importance_threshold: 0.4
  scheduled_reflection: enabled

# Voice configuration
voice:
  call_signs:
    - Malibu
    - Malibooth
    - "Coach Malibu"
  kokoro_voice: am_puck
  default_channel_id: "1480419549403942913"
  smoke_test_channel_id: "1488248020821606492"

# Discord routing
discord:
  default_channel_id: "1480419549403942913"
  smoke_test_channel_id: "1488248020821606492"

# Legacy registry fields
avatar_url: https://cdn.discordapp.com/avatars/1480550297800802485/f132d934eb54bf33d5be0cea339645f0.webp
default_project: wellness
response_mode: concise

provider:
  default: claude-oauth
  reasoning_effort: medium
  fallback:
    - claude-oauth-secondary
    - codex

tools:
  mode: off

orchestration:
  worker_ids:
    - health-analyst
    - nutrition-logger
    - recipe-librarian
    - workout-recorder
    - note-librarian
  write_confirmation: on-ambiguity

deterministic_routing:
  enabled: true
  project_scope: wellness
  additional_domains:
    - notes
  confidence_threshold: 0.8
  provider:
    default: claude-oauth
    reasoning_effort: low
    fallback:
      - claude-oauth-secondary
      - codex
