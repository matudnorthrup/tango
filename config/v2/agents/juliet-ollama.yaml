id: juliet-ollama
enabled: true
display_name: Juliet (Ollama)
type: mental-health

# System prompt = personality + domain + rules
system_prompt_file: agents/assistants/juliet/soul.md

# MCP servers this agent can access
mcp_servers:
  - name: memory
    command: node
    args: ["packages/atlas-memory/dist/index.js"]
  - name: attachments
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "attachments"]
    env:
      ALLOWED_TOOL_IDS: "attachment_search,attachment_read,attachment_status"
  - name: obsidian
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "obsidian"]
    env:
      ALLOWED_TOOL_IDS: "obsidian"
  - name: agent-docs
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "agent-docs"]
    env:
      ALLOWED_TOOL_IDS: "agent_docs"

# Runtime configuration
runtime:
  mode: persistent
  provider: claude-code-v2
  fallback: codex
  model: deepseek-v4-pro:cloud
  reasoning_effort: high
  idle_timeout_hours: 24
  context_reset_threshold: 0.80

# Memory configuration
memory:
  post_turn_extraction: enabled
  extraction_provider: ollama
  extraction_model: gpt-oss:20b
  importance_threshold: 0.4
  scheduled_reflection: enabled

# Discord routing
discord:
  default_channel_id: "1513207684344582184"

# Restrict this clone to its own channel
access:
  mode: allowlist
  allowlist_channel_ids:
    - "1513207684344582184"

# Legacy registry fields
avatar_path: agents/assistants/juliet/avatar.png
default_project: mental-health
response_mode: explain

provider:
  default: ollama
  model: deepseek-v4-pro:cloud
  reasoning_effort: high
  fallback: []

tools:
  mode: allowlist
  allowlist:
    - memory_search
    - memory_add
    - memory_reflect

deterministic_routing:
  enabled: false
  confidence_threshold: 0.8
  provider:
    default: claude-oauth
    reasoning_effort: low
    fallback:
      - claude-oauth-secondary
      - codex

# Voice addressing — distinct "Whiskey <Name>" wake word so it never
# collides with the original juliet's wake word (start-anchored matcher).
voice:
  call_signs:
    - "Whiskey Juliet"
  kokoro_voice: af_bella
  default_channel_id: "1513207684344582184"
