id: jules
enabled: true
display_name: Jules
type: wellness
avatar_url: https://cdn.discordapp.com/avatars/1510427843090452502/b0ddd0c9a49c98bd9478c0d7d98ad700.webp

system_prompt_file: agents/assistants/jules/soul.md

mcp_servers:
  - name: memory
    command: node
    args: ["packages/atlas-memory/dist/index.js"]
  - name: attachments
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "attachments"]
    env:
      ALLOWED_TOOL_IDS: "attachment_search,attachment_read,attachment_status"
  - name: agent-docs
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "agent-docs"]
    env:
      ALLOWED_TOOL_IDS: "agent_docs"
  - name: wellness
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "wellness"]
    env:
      ALLOWED_TOOL_IDS: "nutrition_log_items,fatsecret_api,health_query,workout_sql,recipe_list,recipe_read,recipe_write,health_morning,system_clock,jules_files,walmart,location_read,browser,exa_search,exa_answer,youtube_transcript,youtube_analyze,gog_calendar,gog_docs,gog_docs_update_tab"
  - name: wellness-db
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "wellness-db"]
    env:
      JULES_WELLNESS_DB_PATH: "~/.tango/profiles/default/wellness/wellness.db"
      ALLOWED_TOOL_IDS: "wellnessdb_search_product,wellnessdb_search_supplement,wellnessdb_search_recipe,wellnessdb_get_recipe_detail,wellnessdb_day_summary,wellnessdb_day_range,wellnessdb_recent_meals,wellnessdb_active_supplements,wellnessdb_active_products,wellnessdb_log_meal,wellnessdb_log_supplement,wellnessdb_log_weight,wellnessdb_log_activity,wellnessdb_log_hydration,wellnessdb_log_presence,wellnessdb_add_product,wellnessdb_add_recipe,wellnessdb_update_recipe,wellnessdb_add_day_note,wellnessdb_delete_meal_entry,wellnessdb_update_product,wellnessdb_update_supplement"
  # - name: fatsecret
  #   command: node
  #   args: ["packages/core/dist/mcp-proxy.js", "fatsecret"]
  #   env:
  #     ALLOWED_TOOL_IDS: "fatsecret_api"
  # - name: wellness-files
  #   command: node
  #   args: ["packages/core/dist/mcp-proxy.js", "wellness-files"]
  #   env:
  #     ALLOWED_TOOL_IDS: "TBD"

current_turn_metadata:
  timezone: America/Denver
  time_format: 12h

runtime:
  mode: persistent
  provider: claude-code-v2
  model: claude-opus-4-8
  reasoning_effort: high
  idle_timeout_hours: 4
  context_reset_threshold: 0.80

memory:
  post_turn_extraction: enabled
  extraction_model: claude-haiku-4-5
  importance_threshold: 0.25
  scheduled_reflection: disabled

discord:
  default_channel_id: "1469955798007283803"
  typing_token_env: JULES_DISCORD_TOKEN

access:
  mode: allowlist
  allowlist_channel_ids:
    - "1469955798007283803"

provider:
  default: claude-oauth
  reasoning_effort: high

tools:
  mode: off

orchestration:
  worker_ids:
    - nutrition-logger
    - recipe-librarian
    - health-analyst
    - activity-tracker
    - note-librarian
  write_confirmation: on-ambiguity
