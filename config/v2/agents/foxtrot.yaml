id: foxtrot
enabled: false
display_name: Foxtrot
type: finance
avatar_url: https://example.com/tango/avatars/foxtrot.png

system_prompt_file: agents/assistants/foxtrot/soul.md

mcp_servers:
  - name: memory
    command: node
    args: ["packages/atlas-memory/dist/index.js"]
  - name: attachments
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "attachments"]
    env:
      ALLOWED_TOOL_IDS: "attachment_search,attachment_read,attachment_status"
  - name: lunch-money
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "lunch-money"]
    env:
      ALLOWED_TOOL_IDS: "lunch_money"
  - name: receipt-registry
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "receipt-registry"]
    env:
      ALLOWED_TOOL_IDS: "receipt_registry"
  - name: ramp
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "ramp"]
    env:
      ALLOWED_TOOL_IDS: "ramp_reimbursement"
  - name: browser
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "browser"]
    env:
      ALLOWED_TOOL_IDS: "browser"
  - name: obsidian
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "obsidian"]
    env:
      ALLOWED_TOOL_IDS: "obsidian"
  - name: onepassword
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "onepassword"]
    env:
      ALLOWED_TOOL_IDS: "onepassword"
  - name: walmart
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "walmart"]
    env:
      ALLOWED_TOOL_IDS: "walmart"
  - name: google
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "google"]
    env:
      ALLOWED_TOOL_IDS: "gog_email"
  - name: agent-docs
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "agent-docs"]
    env:
      ALLOWED_TOOL_IDS: "agent_docs"
  - name: kilo-ledger
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "kilo-ledger"]
    env:
      ALLOWED_TOOL_IDS: "kilo_ledger"
  - name: send-image
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "send-image"]
    env:
      ALLOWED_TOOL_IDS: "discord_send_image"

runtime:
  mode: persistent
  provider: claude-code-v2
  fallback: codex
  model: claude-opus-4-8
  reasoning_effort: medium
  idle_timeout_hours: 24
  context_reset_threshold: 0.80

memory:
  post_turn_extraction: enabled
  canonical_agent_id: foxtrot
  alias_agent_ids:
    - foxtrot
    - foxtrot-ollama
  extraction_model: claude-haiku-4-5
  importance_threshold: 0.4
  scheduled_reflection: enabled

voice:
  call_signs:
    - "Zulu Foxtrot"
  kokoro_voice: am_echo
  default_channel_id: "100000000000000005"
  smoke_test_channel_id: "100000000000001005"

discord:
  default_channel_id: "100000000000000005"
  smoke_test_channel_id: "100000000000001005"

# Legacy registry fields
default_project: finance
response_mode: concise

provider:
  default: claude-oauth
  reasoning_effort: medium
  fallback:
    - claude-oauth-secondary
    - codex

tools:
  mode: off

deterministic_routing:
  enabled: true
  confidence_threshold: 0.8
  provider:
    default: claude-oauth
    reasoning_effort: low
    fallback:
      - claude-oauth-secondary
      - codex
