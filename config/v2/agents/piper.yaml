id: piper
enabled: true
display_name: Piper
type: operations

system_prompt_file: agents/assistants/piper/soul.md

mcp_servers:
  - name: memory
    command: node
    args: ["packages/atlas-memory/dist/index.js"]
  - name: attachments
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "attachments"]
    env:
      ALLOWED_TOOL_IDS: "attachment_search,attachment_read,attachment_status"
  - name: agent-docs
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "agent-docs"]
    env:
      ALLOWED_TOOL_IDS: "agent_docs"
  - name: google
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "wellness"]
    env:
      ALLOWED_TOOL_IDS: "gog_calendar,system_clock"
  # Uncomment after Spike 1a live pass/fail:
  # - name: email
  #   command: node
  #   args: ["packages/core/dist/mcp-proxy.js", "wellness"]
  #   env:
  #     ALLOWED_TOOL_IDS: "email_inbox_scan,email_search,email_thread_brief"
  #     PIPER_GMAIL_ACCOUNT: "work@example.test"
  # - name: slack
  #   command: node
  #   args: ["packages/core/dist/mcp-proxy.js", "slack"]
  #   env:
  #     ALLOWED_TOOL_IDS: "slack"
  # - name: tasks
  #   command: node
  #   args: ["packages/core/dist/mcp-proxy.js", "tasks"]
  #   env:
  #     ALLOWED_TOOL_IDS: "TBD"
  - name: send-image
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "send-image"]
    env:
      ALLOWED_TOOL_IDS: "discord_send_image"

current_turn_metadata:
  timezone: UTC
  time_format: 12h

runtime:
  mode: persistent
  provider: claude-code-v2
  model: claude-sonnet-4-6
  reasoning_effort: high
  idle_timeout_hours: 4
  context_reset_threshold: 0.80

memory:
  post_turn_extraction: enabled
  extraction_model: claude-haiku-4-5
  importance_threshold: 0.3
  scheduled_reflection: disabled

discord:
  default_channel_id: "100000000000000003"
  typing_token_env: PIPER_DISCORD_TOKEN

access:
  mode: allowlist
  allowlist_channel_ids:
    - "100000000000000003"

provider:
  default: claude-oauth
  reasoning_effort: high

tools:
  mode: off

orchestration:
  worker_ids:
    - email-execute
    - task-keeper
    - personal-assistant
  write_confirmation: always
