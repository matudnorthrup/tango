id: malibu-ollama
enabled: true
display_name: Malibu (Ollama)
type: wellness

# System prompt = personality + domain + rules
system_prompt_file: agents/assistants/malibu/soul.md

# MCP servers this agent can access
mcp_servers:
  - name: memory
    command: node
    args: ["packages/atlas-memory/dist/index.js"]
  - name: attachments
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "attachments"]
    env:
      ALLOWED_TOOL_IDS: "attachment_search,attachment_read,attachment_status"
  - name: wellness
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "wellness"]
    env:
      ALLOWED_TOOL_IDS: "health_query,workout_sql,nutrition_log_items,recipe_list,recipe_read,recipe_write,system_clock,health_morning"
  - name: fatsecret
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "fatsecret"]
    env:
      ALLOWED_TOOL_IDS: "fatsecret_api"
  - name: atlas
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "atlas"]
    env:
      ALLOWED_TOOL_IDS: "atlas_sql"
  - name: obsidian
    # Note: read-only for Malibu (enforced at MCP server level)
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "obsidian"]
    env:
      ALLOWED_TOOL_IDS: "obsidian"
  - name: agent-docs
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "agent-docs"]
    env:
      ALLOWED_TOOL_IDS: "agent_docs"
  - name: send-image
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "send-image"]
    env:
      ALLOWED_TOOL_IDS: "discord_send_image"

# Runtime configuration
runtime:
  mode: persistent
  provider: claude-code-v2
  fallback: codex
  model: deepseek-v4-pro:cloud
  reasoning_effort: medium
  idle_timeout_hours: 24
  context_reset_threshold: 0.80

# Memory configuration
memory:
  post_turn_extraction: enabled
  extraction_provider: ollama
  extraction_model: deepseek-v4-pro:cloud
  importance_threshold: 0.4
  scheduled_reflection: enabled

# Discord routing
discord:
  default_channel_id: "1513207688086028469"
  smoke_test_channel_id: "100000000000001002" # malibu-test (placeholder; real id in profile overlay)

# Restrict this clone to its own channel plus its persona's -test smoke channel
access:
  mode: allowlist
  allowlist_channel_ids:
    - "1513207688086028469"
    - "100000000000001002" # malibu-test smoke channel (placeholder; real id in profile overlay)

# Legacy registry fields
avatar_url: https://cdn.discordapp.com/avatars/1480550297800802485/f132d934eb54bf33d5be0cea339645f0.webp
default_project: wellness
response_mode: concise

provider:
  default: ollama
  model: deepseek-v4-pro:cloud
  reasoning_effort: medium
  fallback: []

tools:
  mode: off

deterministic_routing:
  enabled: false
  project_scope: wellness
  additional_domains:
    - notes
  confidence_threshold: 0.8
  provider:
    default: claude-oauth
    reasoning_effort: low
    fallback:
      - claude-oauth-secondary
      - codex

# Voice addressing — Ollama clones are the primary voice targets: the bare
# name and nicknames (and hey/hello greetings, which the matcher treats as
# optional prefixes) route here; "Zulu Malibu" is the original's fallback.
voice:
  call_signs:
    - "Bravo Malibu"
    - Malibu
    - Malibooth
    - "Coach Malibu"
  kokoro_voice: am_puck
  default_channel_id: "1513207688086028469"
  smoke_test_channel_id: "100000000000001002" # malibu-test (placeholder; real id in profile overlay)
