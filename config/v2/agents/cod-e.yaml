id: cod-e
display_name: Cod-E
type: quick
avatar_url: https://cdn.discordapp.com/avatars/1509328974667452466/279bd478294f6d865816f8b0bd170cbc.webp

system_prompt_file: agents/assistants/cod-e/soul.md

mcp_servers:
  - name: memory
    command: node
    args: ["packages/atlas-memory/dist/index.js"]
  - name: attachments
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "attachments"]
    env:
      ALLOWED_TOOL_IDS: "attachment_search,attachment_read,attachment_status"
  - name: wellness-db
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "wellness-db"]
    env:
      WELLNESS_DB_PATH: "~/.tango/profiles/default/wellness/wellness.db"
      ALLOWED_TOOL_IDS: "wellnessdb_delete_product,wellnessdb_delete_supplement"
  - name: send-image
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "send-image"]
    env:
      ALLOWED_TOOL_IDS: "discord_send_image"

current_turn_metadata:
  timezone: America/Denver
  time_format: 12h

runtime:
  mode: persistent
  provider: claude-code-v2
  model: claude-opus-4-8
  reasoning_effort: high
  idle_timeout_hours: 4
  context_reset_threshold: 0.80

memory:
  post_turn_extraction: enabled
  extraction_model: claude-haiku-4-5
  importance_threshold: 0.25
  scheduled_reflection: disabled

discord:
  default_channel_id: "1509320762287456457"
  typing_token_env: CODE_DISCORD_TOKEN

access:
  mode: allowlist
  allowlist_channel_ids:
    - "1509320762287456457"

provider:
  default: claude-oauth
  reasoning_effort: high
