id: victor
enabled: false
display_name: Victor
type: operations

# System prompt = personality + domain + rules
system_prompt_file: agents/assistants/victor/soul.md

# MCP servers this agent can access
mcp_servers:
  - name: memory
    command: node
    args: ["packages/atlas-memory/dist/index.js"]
  - name: linear
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "linear"]
    env:
      ALLOWED_TOOL_IDS: "linear"
  - name: obsidian
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "obsidian"]
    env:
      ALLOWED_TOOL_IDS: "obsidian"

# Runtime configuration
runtime:
  mode: persistent
  provider: claude-code-v2
  fallback: codex
  model: claude-sonnet-4-6
  reasoning_effort: max
  idle_timeout_hours: 24
  context_reset_threshold: 0.80

# Memory configuration
memory:
  post_turn_extraction: enabled
  extraction_model: claude-haiku-4-5
  importance_threshold: 0.4
  scheduled_reflection: enabled

# Voice configuration
voice:
  call_signs:
    - Victor
  kokoro_voice: am_liam
  default_channel_id: "1480579160056397958"
  smoke_test_channel_id: "1488248024990875698"

# Discord routing
discord:
  default_channel_id: "1480579160056397958"
  smoke_test_channel_id: "1488248024990875698"

# Legacy registry fields
avatar_url: https://cdn.discordapp.com/avatars/1480581855450497277/cb5e0df0a5857352c71e9fd660f29a23.webp
default_project: operations
response_mode: concise

provider:
  default: claude-oauth
  reasoning_effort: max
  fallback:
    - claude-oauth-secondary
    - codex

tools:
  mode: off

orchestration:
  worker_ids:
    - operations-assistant
    - note-librarian
  write_confirmation: on-ambiguity

deterministic_routing:
  enabled: true
  confidence_threshold: 0.8
  provider:
    default: claude-oauth
    reasoning_effort: low
    fallback:
      - claude-oauth-secondary
      - codex
