id: victor
enabled: false
display_name: Victor
type: operations

# System prompt = personality + domain + rules
system_prompt_file: agents/assistants/victor/soul.md

# MCP servers this agent can access
mcp_servers:
  - name: memory
    command: node
    args: ["packages/atlas-memory/dist/index.js"]
  - name: attachments
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "attachments"]
    env:
      ALLOWED_TOOL_IDS: "attachment_search,attachment_read,attachment_status"
  - name: linear
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "linear"]
    env:
      ALLOWED_TOOL_IDS: "linear"
  - name: obsidian
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "obsidian"]
    env:
      ALLOWED_TOOL_IDS: "obsidian"
  - name: collaboration
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "collaboration"]
    env:
      ALLOWED_TOOL_IDS: "collaborate_with_agent"
  - name: send-image
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "send-image"]
    env:
      ALLOWED_TOOL_IDS: "discord_send_image"

# Runtime configuration
runtime:
  mode: persistent
  provider: claude-code-v2
  fallback: codex
  model: claude-opus-4-8
  reasoning_effort: max
  idle_timeout_hours: 24
  context_reset_threshold: 0.80

# Memory configuration
memory:
  post_turn_extraction: enabled
  canonical_agent_id: victor
  alias_agent_ids:
    - victor
    - victor-ollama
  # 2026-07-18 claude-primary flip (TGO-809): extraction stays on DeepSeek —
  # the clones have extracted with it since June and it conserves the Claude
  # subscription budget for turn traffic.
  extraction_model: deepseek-v4-pro:cloud
  importance_threshold: 0.4
  scheduled_reflection: enabled

responsibilities:
  - id: operations_coordination
    description: Coordinate operations work with specialist agents when a bounded specialist result would help complete the user's objective.
    objectives:
      - Keep implementation and project-management work grounded in the user's stated goal.
      - Ask specialists for bounded evidence or status, then synthesize the result for the user.
    autonomy:
      default: supervised
      writes_require_confirmation: true
      purchase_or_payment: never
    collaboration:
      can_request:
        - agent: sierra
          purposes: ["source-check", "vendor-comparison", "local-business-research"]

# Voice configuration
voice:
  call_signs:
    - Victor
  kokoro_voice: am_liam
  default_channel_id: "100000000000000004"
  smoke_test_channel_id: "100000000000001004"

# Discord routing
discord:
  default_channel_id: "100000000000000004"
  smoke_test_channel_id: "100000000000001004"

# Legacy registry fields
avatar_url: https://example.com/tango/avatars/victor.png
default_project: operations
response_mode: concise

provider:
  default: claude-oauth
  reasoning_effort: max
  fallback:
    - claude-oauth-secondary
    - codex
    # 2026-07-18 (TGO-809): a full Claude outage fails over to the
    # unmetered Ollama/DeepSeek path after codex.
    - ollama

tools:
  mode: off

deterministic_routing:
  enabled: true
  confidence_threshold: 0.8
  provider:
    default: claude-oauth
    reasoning_effort: low
    fallback:
      - claude-oauth-secondary
      - codex
      # 2026-07-18 (TGO-809): a full Claude outage fails over to the
      # unmetered Ollama/DeepSeek path after codex.
      - ollama
