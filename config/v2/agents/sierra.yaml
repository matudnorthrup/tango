id: sierra
enabled: false
display_name: Sierra
type: research

# System prompt = personality + domain + rules
system_prompt_file: agents/assistants/sierra/soul.md

# MCP servers this agent can access
mcp_servers:
  - name: memory
    command: node
    args: ["packages/atlas-memory/dist/index.js"]
  - name: attachments
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "attachments"]
    env:
      ALLOWED_TOOL_IDS: "attachment_search,attachment_read,attachment_status"
  - name: google
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "google"]
    env:
      ALLOWED_TOOL_IDS: "gog_email,gog_calendar,gog_docs,gog_docs_update_tab"
  - name: exa
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "exa"]
    env:
      ALLOWED_TOOL_IDS: "exa_search,exa_answer"
  - name: browser
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "browser"]
    env:
      ALLOWED_TOOL_IDS: "browser"
  - name: obsidian
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "obsidian"]
    env:
      ALLOWED_TOOL_IDS: "obsidian"
  - name: onepassword
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "onepassword"]
    env:
      ALLOWED_TOOL_IDS: "onepassword"
  - name: printer
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "printer"]
    env:
      ALLOWED_TOOL_IDS: "printer_command,openscad_render,prusa_slice,paper_print"
  - name: location
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "location"]
    env:
      ALLOWED_TOOL_IDS: "location_read,local_business_search,driving_route,walking_route,route_ahead_search,find_diesel"
  - name: file-ops
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "file-ops"]
    env:
      ALLOWED_TOOL_IDS: "file_ops"
  - name: slack
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "slack"]
    env:
      ALLOWED_TOOL_IDS: "slack"
  - name: youtube
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "youtube"]
    env:
      ALLOWED_TOOL_IDS: "youtube_transcript,youtube_analyze"
  - name: agent-docs
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "agent-docs"]
    env:
      ALLOWED_TOOL_IDS: "agent_docs"
  - name: notion
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "notion"]
    env:
      ALLOWED_TOOL_IDS: "notion"
  - name: send-image
    command: node
    args: ["packages/core/dist/mcp-proxy.js", "send-image"]
    env:
      ALLOWED_TOOL_IDS: "discord_send_image"

mcp:
  default_servers:
    - memory
    - exa

# Runtime configuration
runtime:
  mode: persistent
  provider: claude-code-v2
  fallback: codex
  model: claude-opus-4-8
  reasoning_effort: high
  idle_timeout_hours: 24
  context_reset_threshold: 0.80

# Memory configuration
memory:
  post_turn_extraction: enabled
  canonical_agent_id: sierra
  alias_agent_ids:
    - sierra
    - sierra-ollama
  extraction_model: claude-haiku-4-5
  importance_threshold: 0.4
  scheduled_reflection: enabled

responsibilities:
  - id: research_support
    description: Provide bounded research, source checking, and comparison support for other agents.
    objectives:
      - Return source-grounded findings with concise evidence.
      - Avoid writes or purchases when fulfilling collaboration requests unless a separate configured responsibility allows them.
    autonomy:
      default: supervised
      writes_require_confirmation: true
      purchase_or_payment: never
    collaboration:
      can_fulfill:
        - purpose: source-check
          max_turns: 1
          max_duration_seconds: 180
          max_tool_calls: 6
          visibility_modes: ["summary", "digest", "thread", "transcript", "silent"]
        - purpose: vendor-comparison
          max_turns: 1
          max_duration_seconds: 240
          max_tool_calls: 8
          visibility_modes: ["summary", "digest", "thread", "transcript", "silent"]
        - purpose: local-business-research
          max_turns: 1
          max_duration_seconds: 240
          max_tool_calls: 8
          visibility_modes: ["summary", "digest", "thread", "transcript", "silent"]

# Voice configuration
voice:
  call_signs:
    - "Zulu Sierra"
  kokoro_voice: af_heart
  default_channel_id: "100000000000000003"
  smoke_test_channel_id: "100000000000001003"

# Discord routing
discord:
  default_channel_id: "100000000000000003"
  smoke_test_channel_id: "100000000000001003"

# Legacy registry fields
avatar_url: https://example.com/tango/avatars/sierra.png
default_project: personal
response_mode: concise

provider:
  default: claude-oauth
  reasoning_effort: high
  fallback:
    - claude-oauth-secondary
    - codex

tools:
  mode: allowlist
  allowlist:
    - WebSearch
    - WebFetch

deterministic_routing:
  enabled: true
  confidence_threshold: 0.8
  provider:
    default: claude-oauth
    reasoning_effort: low
    fallback:
      - claude-oauth-secondary
      - codex
