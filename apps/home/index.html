<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Mac Studio</title>
  <style>
    :root {
      --bg: #131316;
      --card: #1c1c21;
      --border: rgba(255, 255, 255, 0.12);
      --fg: #fafafa;
      --muted: #a1a1ab;
      --accent: #a3e635;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-tap-highlight-color: transparent;
    }
    main { width: 100%; max-width: 440px; }
    header { margin-bottom: 28px; }
    h1 { font-size: 28px; letter-spacing: -0.02em; }
    h1 .dot { color: var(--accent); }
    header p { color: var(--muted); font-size: 14px; margin-top: 4px; }
    .sites { display: grid; gap: 12px; }
    a.site {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s ease, transform 0.15s ease;
    }
    a.site:hover { border-color: var(--accent); transform: translateY(-1px); }
    .icon {
      font-size: 24px;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      flex-shrink: 0;
    }
    .meta { min-width: 0; display: grid; gap: 2px; }
    .meta .name { font-weight: 600; font-size: 16px; }
    .meta .desc { color: var(--muted); font-size: 13px; }
    .arrow { margin-left: auto; color: var(--muted); font-size: 18px; }
    footer { margin-top: 28px; color: var(--muted); font-size: 12px; text-align: center; }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Mac Studio<span class="dot">.</span></h1>
      <p>Self-hosted sites on the tailnet</p>
    </header>

    <nav class="sites">
      <!-- Add new sites here: copy a card, set href / icon / name / description -->
      <a class="site" href="/tango-workout/">
        <span class="icon">🏋️</span>
        <span class="meta">
          <span class="name">Tango Lift</span>
          <span class="desc">Workout logging, progress &amp; PRs</span>
        </span>
        <span class="arrow">›</span>
      </a>

      <a class="site" href="/kilo/">
        <span class="icon">💰</span>
        <span class="meta">
          <span class="name">Kilo Ledger</span>
          <span class="desc">Budget buckets &amp; transactions</span>
        </span>
        <span class="arrow">›</span>
      </a>

      <a class="site" href="/tango-state/">
        <span class="icon">⟢</span>
        <span class="meta">
          <span class="name">Tango State</span>
          <span class="desc">Canonical entities, history &amp; staleness</span>
        </span>
        <span class="arrow">›</span>
      </a>
    </nav>

    <footer>mac-studio.tailead658.ts.net · tailnet only</footer>
  </main>
</body>
</html>
